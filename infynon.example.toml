# ============================================================
# INFYNON FIREWALL CONFIGURATION
# ============================================================
# Copy this file to infynon.toml and customize.
# Config is also editable from the TUI (press 7 for Config view).
# Changes to this file are auto-detected and hot-reloaded within seconds.
# Config is also editable from the TUI (press 7 for Config view).

# --- SERVER ---
[server]
listen_address = "0.0.0.0"            # Address to bind to
listen_port = 8080                     # Port to listen on
max_connections = 10000                # Max concurrent connections
request_timeout_seconds = 30           # Timeout for full request read
worker_threads = 0                     # 0 = auto (number of CPU cores)
maintenance_mode = false               # Set to true to return 503 maintenance page to all requests

# --- UPSTREAM (default backend) ---
[upstream]
address = "127.0.0.1"                 # Backend address
port = 3000                            # Backend port
health_check_path = "/health"          # Health check endpoint
health_check_interval_seconds = 10
forward_timeout_seconds = 30

# --- MULTI-UPSTREAM ROUTING ---
# Route different paths to different backend services.
# Checked in order; first matching path_prefix wins.
# Requests not matching any route go to the default [upstream] above.

# [[upstreams]]
# name = "api-server"
# path_prefix = "/api"
# address = "127.0.0.1"
# port = 4000
# strip_prefix = false                 # If true, strips the prefix before forwarding

# [[upstreams]]
# name = "static-server"
# path_prefix = "/static"
# address = "127.0.0.1"
# port = 5000
# strip_prefix = true

# --- TLS (optional) ---
[tls]
enabled = false
# cert_path = "tls/cert.pem"
# key_path = "tls/key.pem"

# --- IP FILTERING ---
[ip]
mode = "blocklist"                     # "blocklist" | "allowlist" | "disabled"
# blocklist_file = "blocklists/ip-blocklist.txt"
# allowlist_file = "blocklists/ip-allowlist.txt"
blocklist = []
allowlist = []

[ip.auto_reputation]
enabled = true
threshold = 50                         # Block after N blocked requests
window_minutes = 60                    # Within this time window
ban_duration_minutes = 1440            # Ban for 24 hours

# --- RATE LIMITING ---
[rate_limit]
enabled = true

[rate_limit.global]
requests_per_second = 1000

[rate_limit.per_ip]
requests = 100
window_seconds = 60

[rate_limit.per_path]
"/api/login" = { requests = 5, window_seconds = 60 }
"/api/register" = { requests = 3, window_seconds = 60 }

# --- WAF (Web Application Firewall) ---
[waf]
enabled = true
sqli_protection = true
xss_protection = true
path_traversal_protection = true
command_injection_protection = true
header_injection_protection = true
max_url_length = 4096
max_header_size = 8192
max_body_size = 10485760               # 10MB
allowed_methods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS", "HEAD"]
blocked_extensions = [".env", ".git", ".sql", ".bak", ".log", ".ini", ".cfg"]
blocked_paths = [
    "/wp-admin",
    "/wp-login.php",
    "/.git/",
    "/.env",
    "/phpinfo.php",
    "/server-status",
    "/actuator",
]
block_empty_user_agent = true
blocked_user_agents = [
    "sqlmap",
    "nikto",
    "nmap",
    "dirbuster",
    "gobuster",
    "masscan",
    "ZmEu",
]
allowed_content_types = [
    "application/json",
    "application/x-www-form-urlencoded",
    "multipart/form-data",
    "text/plain",
    "text/html",
    "application/xml",
]

# --- CUSTOM RULES ---
# Rules are evaluated in priority order (lowest first).
# All conditions in a rule must match (AND logic).

# [[rules]]
# name = "block-admin-external"
# description = "Block external access to admin endpoints"
# priority = 10
# enabled = true
# [rules.condition]
# path_prefix = "/admin"
# [rules.action]
# type = "block"
# status = 403
# message = "Admin access denied"

# [[rules]]
# name = "flag-trace-method"
# description = "Flag but allow TRACE method for monitoring"
# priority = 100
# enabled = true
# [rules.condition]
# method = ["TRACE", "CONNECT"]
# [rules.action]
# type = "flag"
# tag = "unusual-method"

# --- LOGGING ---
[logging]
access_log = "logs/access.jsonl"
blocked_log = "logs/blocked.jsonl"
alert_log = "logs/alerts.jsonl"
error_log = "logs/error.log"
max_file_size_mb = 100
max_files = 10
log_request_headers = true
log_request_body = false

# --- TUI ---
[tui]
refresh_rate_fps = 10
default_view = "dashboard"
theme = "dark"
max_events_in_memory = 10000

# --- CUSTOM RESPONSES ---
[responses]
# block_page_html = "responses/block.html"
# block_page_json = "responses/block.json"
# ratelimit_page_html = "responses/ratelimit.html"
# maintenance_page_html = "responses/maintenance.html"

# --- EMAIL NOTIFICATIONS ---
# Sends alert emails on suspicious activity and daily digest reports.
# Supports SMTP and AWS SES providers.
[email]
enabled = false
provider = "smtp"                      # "smtp" or "ses"
from = "firewall@example.com"
to = ["admin@example.com"]

# Alert triggers
alert_on_block_threshold = 100         # Send alert when blocks/min exceeds this (0 = disabled)
alert_window_minutes = 5               # Window for threshold calculation
alert_on_ip_ban = true                 # Send alert when an IP is auto-banned
daily_digest = true                    # Send daily summary email
daily_digest_hour = 8                  # Hour (UTC) to send daily digest (0-23)

[email.smtp]
host = "smtp.gmail.com"
port = 587
username = "your-email@gmail.com"
password = "your-app-password"
tls = true

# AWS SES (alternative to SMTP)
# Set provider = "ses" and configure:
[email.ses]
region = "us-east-1"
access_key_id = ""
secret_access_key = ""
